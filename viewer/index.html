<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Webcam Spiazzi di Gromo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      background: #1a1d27;
      border-bottom: 1px solid #2e3347;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
    }

    header span {
      font-size: 0.85rem;
      color: #6b7280;
    }

    .controls {
      padding: 20px 24px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
      background: #13151f;
      border-bottom: 1px solid #2e3347;
    }

    .controls label {
      font-size: 0.8rem;
      color: #9ca3af;
      margin-bottom: 4px;
      display: block;
    }

    select {
      background: #1e2130;
      border: 1px solid #3a3f55;
      color: #e0e0e0;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      min-width: 160px;
    }

    select:focus { outline: 2px solid #4f6ef7; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 20px;
      padding: 24px;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2e3347;
      border-radius: 12px;
      overflow: hidden;
    }

    .card-header {
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2e3347;
    }

    .card-header .cam-name {
      font-weight: 600;
      font-size: 0.9rem;
      color: #c7d0f8;
      text-transform: capitalize;
    }

    .card-header .cam-time {
      font-size: 0.75rem;
      color: #6b7280;
    }

    .card img {
      width: 100%;
      display: block;
      background: #0f1117;
      min-height: 200px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .card img:hover { opacity: 0.9; }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #lightbox.open { display: flex; }

    #lightbox img {
      max-width: 100%;
      max-height: 90vh;
      border-radius: 8px;
    }

    #lightbox-close {
      position: fixed;
      top: 16px;
      right: 20px;
      background: none;
      border: none;
      color: #fff;
      font-size: 2rem;
      cursor: pointer;
      line-height: 1;
    }

    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 20px;
      color: #4b5563;
    }

    .loading {
      text-align: center;
      padding: 60px;
      color: #6b7280;
    }
  </style>
</head>
<body>

  <header>
    <div>
      <h1>📷 Webcam Spiazzi di Gromo</h1>
      <span id="status">Caricamento archivio...</span>
    </div>
  </header>

  <div class="controls">
    <div>
      <label>Data</label>
      <select id="date-select"><option>Caricamento...</option></select>
    </div>
    <div>
      <label>Orario</label>
      <select id="time-select"><option>—</option></select>
    </div>
    <div>
      <label>Webcam</label>
      <select id="cam-select">
        <option value="all">Tutte</option>
        <option value="campetto">Campetto</option>
        <option value="pagherolo">Pagherolo</option>
        <option value="current">Current</option>
        <option value="current2">Current 2</option>
      </select>
    </div>
  </div>

  <div id="grid" class="grid">
    <div class="loading">Caricamento...</div>
  </div>

  <div id="lightbox">
    <button id="lightbox-close">✕</button>
    <img id="lightbox-img" src="" alt="" />
  </div>

  <script>
    // ⚠️ Sostituisci con l'URL pubblico del tuo bucket R2
    const R2_PUBLIC_URL = 'https://pub-06bd8927e9e446eaa0631caa13e8e500.r2.dev';

    let allKeys = [];
    let selectedDate = null;
    let selectedTime = null;

    // --- Fetch indice ---
    async function loadIndex() {
      try {
        const res = await fetch(`${R2_PUBLIC_URL}/index.json?t=${Date.now()}`);
        if (!res.ok) throw new Error('Indice non trovato');
        allKeys = await res.json();
        document.getElementById('status').textContent =
          `${allKeys.length} immagini in archivio`;
        populateDateSelect();
      } catch (err) {
        document.getElementById('status').textContent = 'Errore caricamento archivio';
        document.getElementById('grid').innerHTML =
          '<div class="empty">Impossibile caricare l\'archivio.<br>Verifica che il bucket R2 sia pubblico e l\'URL sia corretto.</div>';
      }
    }

    // --- Estrai date disponibili ---
    function getDates() {
      const dates = [...new Set(allKeys.map(k => k.split('/')[1]))].sort().reverse();
      return dates;
    }

    // --- Estrai orari per una data ---
    function getTimesForDate(date) {
      const times = [...new Set(
        allKeys
          .filter(k => k.includes(`/${date}/`))
          .map(k => k.split('/')[2].split('_')[0])
      )].sort().reverse();
      return times;
    }

    // --- Popola select date ---
    function populateDateSelect() {
      const dates = getDates();
      const sel = document.getElementById('date-select');
      sel.innerHTML = dates.map(d =>
        `<option value="${d}">${formatDate(d)}</option>`
      ).join('');
      selectedDate = dates[0];
      populateTimeSelect();
    }

    // --- Popola select orari ---
    function populateTimeSelect() {
      const times = getTimesForDate(selectedDate);
      const sel = document.getElementById('time-select');
      sel.innerHTML = times.map(t =>
        `<option value="${t}">${t.replace('-', ':')}</option>`
      ).join('');
      selectedTime = times[0];
      renderGrid();
    }

    // --- Render griglia immagini ---
    function renderGrid() {
      const camFilter = document.getElementById('cam-select').value;

      const keys = allKeys.filter(k => {
        const parts = k.split('/');
        const date = parts[1];
        const filename = parts[2];
        const time = filename.split('_')[0];
        const cam = filename.replace(`${time}_`, '').replace('.jpg', '');

        return date === selectedDate &&
               time === selectedTime &&
               (camFilter === 'all' || cam === camFilter);
      });

      const grid = document.getElementById('grid');

      if (keys.length === 0) {
        grid.innerHTML = '<div class="empty">Nessuna immagine per questa selezione.</div>';
        return;
      }

      grid.innerHTML = keys.map(key => {
        const filename = key.split('/')[2];
        const time = filename.split('_')[0].replace('-', ':');
        const cam = filename.replace(`${filename.split('_')[0]}_`, '').replace('.jpg', '');
        const imgUrl = `${R2_PUBLIC_URL}/${key}`;
        return `
          <div class="card">
            <div class="card-header">
              <span class="cam-name">${cam}</span>
              <span class="cam-time">${formatDate(selectedDate)} — ${time}</span>
            </div>
            <img src="${imgUrl}" alt="${cam}" loading="lazy"
                 onclick="openLightbox('${imgUrl}')"
                 onerror="this.style.minHeight='120px';this.alt='Immagine non disponibile'"/>
          </div>
        `;
      }).join('');
    }

    // --- Lightbox ---
    function openLightbox(url) {
      document.getElementById('lightbox-img').src = url;
      document.getElementById('lightbox').classList.add('open');
    }

    document.getElementById('lightbox-close').onclick = () =>
      document.getElementById('lightbox').classList.remove('open');
    document.getElementById('lightbox').onclick = (e) => {
      if (e.target === document.getElementById('lightbox'))
        document.getElementById('lightbox').classList.remove('open');
    };

    // --- Event listeners ---
    document.getElementById('date-select').onchange = (e) => {
      selectedDate = e.target.value;
      populateTimeSelect();
    };

    document.getElementById('time-select').onchange = (e) => {
      selectedTime = e.target.value;
      renderGrid();
    };

    document.getElementById('cam-select').onchange = () => renderGrid();

    // --- Helpers ---
    function formatDate(d) {
      const [y, m, day] = d.split('-');
      return `${day}/${m}/${y}`;
    }

    // --- Avvio ---
    loadIndex();
  </script>

</body>
</html>

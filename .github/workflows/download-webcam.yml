name: Download Webcam Images

on:
  schedule:
    # Ogni giorno alle 09:00 e alle 17:00 (ora UTC+0 — in Italia sono +1/+2)
    - cron: '0 7,15 * * *'
  workflow_dispatch: # permette di avviarlo manualmente dal sito GitHub

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run download script
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: webcam-spiazzi
        run: node scripts/download.mjs
